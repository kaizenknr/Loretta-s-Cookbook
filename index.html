<style>
  :root{
    --bg:#ffffff;
    --bg-2:#f1efe9;
    --card:#ffffff;
    --ink:#453a2e;
    --ink-soft:#6f6152;
    --muted:#a2917c;
    --line:#e7dcc4;
    --accent:#c34a3c;            /* cherry red */
    --accent-deep:#a5392e;
    --accent-soft:#f7e2dc;
    --blue:127,176,204;          /* gingham line rgb */
    --blue-solid:#7fb0cc;
    --blue-trim:#a9d2e4;
    --blue-soft:#e6f1f6;
    --blue-ink:#3f6376;
    --shadow:0 6px 18px rgba(120,90,50,.12);
    --shadow-lg:0 14px 36px rgba(120,90,50,.20);
    --radius:18px;
    --script:"Snell Roundhand","Savoye LET","Apple Chancery",cursive;
    --hand:"Marker Felt","Noteworthy","Bradley Hand","Chalkboard SE",cursive;
    --serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --body:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#241d17;
      --bg-2:#2b231b;
      --card:#2e2519;
      --ink:#f3e7d2;
      --ink-soft:#cdba9f;
      --muted:#a2917c;
      --line:#40341f;
      --accent:#e0705f;
      --accent-deep:#e0705f;
      --accent-soft:#3f2a24;
      --blue:120,168,196;
      --blue-solid:#6f9fbb;
      --blue-trim:#4e788e;
      --blue-soft:#2a3941;
      --blue-ink:#a5cade;
      --shadow:0 6px 18px rgba(0,0,0,.35);
      --shadow-lg:0 14px 36px rgba(0,0,0,.5);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--body);
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
    overflow-x:hidden;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .app{max-width:640px;margin:0 auto;min-height:100vh}

  /* ---------- gingham fabric ---------- */
  .gingham{
    background-color:#fbfdff;
    background-image:
      repeating-linear-gradient(0deg,  rgba(var(--blue),.5) 0 12px, rgba(var(--blue),0) 12px 24px),
      repeating-linear-gradient(90deg, rgba(var(--blue),.5) 0 12px, rgba(var(--blue),0) 12px 24px);
  }
  @media (prefers-color-scheme: dark){
    .gingham{ background-color:#26313a; }
  }

  /* ---------- Home ---------- */
  .banner{ height:calc(var(--safe-top) + 30px); }
  .banner-scallop{
    height:14px; position:relative; z-index:2;
    -webkit-mask:radial-gradient(circle at 12px 0, #000 11px, transparent 11.5px) 0 0/24px 14px repeat-x;
            mask:radial-gradient(circle at 12px 0, #000 11px, transparent 11.5px) 0 0/24px 14px repeat-x;
  }
  .home-head{ padding:20px 22px 6px; text-align:center }
  .tagline{
    font-family:var(--hand); color:var(--accent); font-size:20px; font-weight:600;
    display:inline-block; transform:rotate(-2.5deg); margin-bottom:2px;
  }
  .tagline::before,.tagline::after{ content:"\2740"; opacity:.6; font-size:13px; margin:0 8px; vertical-align:middle }
  .masthead{
    font-family:var(--script); font-weight:400;
    font-size:56px; line-height:.98; color:var(--accent-deep);
    margin:2px 0 8px; padding:0 6px;
  }
  .subtitle{ font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:16px; margin:0 }

  .search{ margin:16px 18px 4px; position:relative }
  .search input{
    width:100%; padding:14px 16px 14px 44px; border-radius:14px;
    border:1.6px solid var(--line); background:var(--card); color:var(--ink);
    font-size:16px; box-shadow:var(--shadow); outline:none;
  }
  .search input:focus{ border-color:var(--blue-solid) }
  .search svg{ position:absolute; left:15px; top:50%; transform:translateY(-50%); color:var(--blue-ink); opacity:.7 }

  .chips{ display:flex; gap:9px; padding:14px 18px 6px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none }
  .chips::-webkit-scrollbar{ display:none }
  .chip{
    flex:0 0 auto; padding:8px 16px; border-radius:999px; font-size:14px; font-weight:600;
    background:var(--card); color:var(--blue-ink); border:1.6px dashed var(--blue-solid); white-space:nowrap;
  }
  .chip.active{ background:var(--accent); color:#fff; border:1.6px solid var(--accent); box-shadow:var(--shadow) }

  .grid{ padding:12px 16px 30px; display:grid; grid-template-columns:1fr 1fr; gap:15px }
  @media (max-width:380px){ .grid{ grid-template-columns:1fr } }
  .card{
    position:relative; background:var(--card); border-radius:var(--radius); overflow:hidden;
    box-shadow:var(--shadow); text-align:left; display:flex; flex-direction:column;
    transition:transform .12s ease;
  }
  .card::after{
    content:""; position:absolute; inset:6px; border:1.5px dashed var(--accent);
    border-radius:12px; opacity:.5; pointer-events:none; z-index:2;
  }
  .card:active{ transform:scale(.97) }
  .card .thumb{
    height:112px; display:flex; align-items:center; justify-content:center; font-size:54px;
    background-color:#fbfdff;
    background-image:
      repeating-linear-gradient(0deg,  rgba(var(--blue),.5) 0 12px, rgba(var(--blue),0) 12px 24px),
      repeating-linear-gradient(90deg, rgba(var(--blue),.5) 0 12px, rgba(var(--blue),0) 12px 24px);
    border-bottom:1.5px solid var(--line);
  }
  .card .thumb img{ width:100%; height:100%; object-fit:cover }
  .card .body{ padding:12px 14px 15px }
  .card h3{ font-family:var(--serif); margin:0 0 6px; font-size:17px; font-weight:700; line-height:1.18 }
  .card .meta{ display:flex; gap:10px; color:var(--muted); font-size:12.5px; flex-wrap:wrap }
  .card .meta span{ display:inline-flex; align-items:center; gap:3px }

  .empty{ padding:56px 30px; text-align:center; color:var(--muted); font-family:var(--serif); font-style:italic }
  .home-foot{ padding:8px 24px calc(var(--safe-bottom) + 30px); text-align:center; color:var(--muted); font-family:var(--hand); font-size:16px }

  /* ---------- Recipe ---------- */
  .topbar{
    position:sticky; top:0; z-index:20;
    padding:calc(var(--safe-top) + 8px) 12px 8px;
    display:flex; align-items:center; gap:6px;
    background:color-mix(in srgb,var(--bg) 84%, transparent);
    backdrop-filter:saturate(180%) blur(14px); -webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid transparent;
  }
  .topbar.scrolled{ border-bottom-color:var(--line) }
  .back{ display:inline-flex; align-items:center; gap:5px; font-size:16px; font-weight:600; color:var(--accent); padding:8px 10px 8px 4px }
  .topbar .t-title{ flex:1; text-align:center; font-family:var(--serif); font-size:16px; font-weight:700; opacity:0; transition:opacity .2s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; padding:0 6px }
  .topbar.scrolled .t-title{ opacity:1 }
  .topbar .spacer{ width:52px; flex:0 0 auto }

  .hero{
    position:relative; margin:6px 16px 0; border-radius:22px; height:172px;
    display:flex; align-items:center; justify-content:center; font-size:90px;
    box-shadow:var(--shadow); overflow:hidden;
  }
  .hero::after{
    content:""; position:absolute; inset:8px; border:2px dashed var(--accent);
    border-radius:15px; opacity:.5; pointer-events:none;
  }
  .hero img{ width:100%; height:100%; object-fit:cover }

  .r-head{ padding:18px 22px 4px; text-align:center }
  .r-cat{ font-family:var(--serif); color:var(--accent); font-size:13px; font-weight:700; letter-spacing:.14em; text-transform:uppercase }
  .r-cat::before,.r-cat::after{ content:"\00B7"; margin:0 7px }
  .r-head h1{ font-family:var(--serif); margin:8px 0 8px; font-size:29px; line-height:1.14; font-weight:700 }
  .r-head .desc{ font-family:var(--serif); font-style:italic; color:var(--ink-soft); font-size:16.5px; margin:0 }
  .r-meta{ display:flex; gap:9px; flex-wrap:wrap; justify-content:center; padding:16px 22px 6px }
  .pill{
    background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:9px 14px;
    display:flex; flex-direction:column; align-items:center; box-shadow:var(--shadow); min-width:76px;
  }
  .pill b{ font-family:var(--serif); font-size:15px }
  .pill small{ color:var(--blue-ink); font-size:11px; text-transform:uppercase; letter-spacing:.08em; margin-top:1px }

  .section{ padding:24px 22px 4px }
  .section h2{ font-family:var(--serif); font-size:22px; margin:0 0 3px; font-weight:700; display:flex; align-items:center; gap:10px }
  .section h2 .num{
    background:var(--accent); color:#fff; width:28px; height:28px; border-radius:9px;
    font-size:14px; display:inline-flex; align-items:center; justify-content:center; font-weight:700;
    box-shadow:0 2px 5px rgba(163,57,46,.35);
  }
  .section .sub{ color:var(--muted); font-family:var(--serif); font-style:italic; font-size:14px; margin:0 0 12px; padding-left:38px }

  ul.ings{ list-style:none; margin:6px 0 0; padding:0 }
  ul.ings li{ display:flex; align-items:flex-start; gap:12px; padding:12px 4px; border-bottom:1.5px dotted var(--blue-solid); font-size:16.5px }
  ul.ings li:last-child{ border-bottom:none }
  .check{
    flex:0 0 auto; width:24px; height:24px; border-radius:7px; border:2px solid var(--blue-solid); margin-top:1px;
    display:flex; align-items:center; justify-content:center; transition:all .12s; background:var(--card);
  }
  .ings li.done .check,.step.done .check{ background:var(--accent); border-color:var(--accent) }
  .check svg{ opacity:0; transition:opacity .12s }
  .ings li.done .check svg,.step.done .check svg{ opacity:1 }
  .ings li.done .txt,.step.done .stext{ color:var(--muted); text-decoration:line-through }

  .steps{ margin:8px 0 0; padding:0; list-style:none }
  .step{ display:flex; gap:14px; padding:16px 0; border-bottom:1.5px dotted var(--blue-solid); align-items:flex-start }
  .step:last-child{ border-bottom:none }
  .step .sidx{
    flex:0 0 auto; width:32px; height:32px; border-radius:50%; margin-top:1px;
    font-family:var(--serif); font-weight:700; font-size:15px; color:var(--blue-ink);
    display:flex; align-items:center; justify-content:center;
    background-color:#fbfdff;
    background-image:
      repeating-linear-gradient(0deg,  rgba(var(--blue),.5) 0 8px, rgba(var(--blue),0) 8px 16px),
      repeating-linear-gradient(90deg, rgba(var(--blue),.5) 0 8px, rgba(var(--blue),0) 8px 16px);
    box-shadow:0 1px 3px rgba(120,90,50,.2); border:1.5px solid #fff;
  }
  .step.done .sidx{ background:var(--accent); color:#fff; background-image:none }
  .step .sbody{ flex:1; min-width:0 }
  .step .stext{ font-size:16.5px; margin:0 }
  .step .check{ margin-left:8px }
  .step-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px }
  .timer-btn{
    margin-top:12px; display:inline-flex; align-items:center; gap:8px;
    background:var(--accent-soft); color:var(--accent-deep); font-weight:700; font-size:14.5px;
    padding:9px 15px; border-radius:12px; border:1.5px dashed var(--accent);
  }
  .timer-btn:active{ transform:scale(.96) }
  .timer-btn.running{ background:var(--accent); color:#fff; border-style:solid }

  .notes{
    position:relative; margin:26px 22px 8px; padding:18px 18px 16px;
    background:var(--card); border:1.5px dashed var(--blue-solid); border-radius:14px;
    color:var(--ink-soft); font-family:var(--hand); font-size:16.5px; line-height:1.55;
    box-shadow:var(--shadow); transform:rotate(-.7deg);
  }
  .notes::before{
    content:""; position:absolute; top:-8px; left:50%; transform:translateX(-50%);
    width:13px; height:13px; border-radius:50%; background:var(--accent);
    box-shadow:0 2px 3px rgba(0,0,0,.3), inset 0 1px 1px rgba(255,255,255,.4);
  }
  .notes .lbl{ display:block; color:var(--accent); font-weight:700; font-size:15px; margin-bottom:3px; letter-spacing:.02em }
  .r-foot{ height:calc(var(--safe-bottom) + 120px) }

  /* ---------- Timer tray ---------- */
  #tray{ position:fixed; left:0; right:0; bottom:0; z-index:40; padding:10px 14px calc(var(--safe-bottom) + 10px); display:flex; flex-direction:column; gap:8px; pointer-events:none }
  .tmr{
    pointer-events:auto; max-width:612px; margin:0 auto; width:100%;
    background:var(--card); border:1.5px solid var(--line); border-radius:16px; box-shadow:var(--shadow-lg);
    padding:11px 12px 11px 14px; display:flex; align-items:center; gap:12px; animation:pop .2s ease;
  }
  @keyframes pop{ from{ transform:translateY(20px); opacity:0 } to{ transform:none; opacity:1 } }
  .tmr.done{ background:var(--accent); border-color:var(--accent); color:#fff; animation:flash 1s ease infinite }
  @keyframes flash{ 0%,100%{ box-shadow:var(--shadow-lg) } 50%{ box-shadow:0 0 0 4px rgba(195,74,60,.4),var(--shadow-lg) } }
  .tmr .ring{ flex:0 0 auto; width:40px; height:40px; position:relative }
  .tmr .ring svg{ transform:rotate(-90deg) }
  .tmr .info{ flex:1; min-width:0 }
  .tmr .info .lab{ font-family:var(--serif); font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
  .tmr.done .info .lab{ color:rgba(255,255,255,.85) }
  .tmr .info .time{ font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:.5px }
  .tmr .acts{ display:flex; gap:6px; flex:0 0 auto }
  .tmr .tbtn{ width:38px; height:38px; border-radius:11px; background:var(--bg-2); display:flex; align-items:center; justify-content:center }
  .tmr.done .tbtn{ background:rgba(255,255,255,.2) }
  .tmr .tbtn svg{ display:block }

  /* ---------- A2HS banner ---------- */
  #a2hs{
    position:fixed; left:12px; right:12px; bottom:calc(var(--safe-bottom) + 12px); z-index:60;
    max-width:612px; margin:0 auto; background:var(--card); border:1.5px dashed var(--accent);
    border-radius:18px; box-shadow:var(--shadow-lg); padding:14px 16px; display:none; gap:12px; align-items:center;
  }
  #a2hs .ic{ font-size:30px }
  #a2hs .tx{ flex:1; font-size:14px; color:var(--ink-soft) }
  #a2hs .tx b{ color:var(--ink) }
  #a2hs button{ background:var(--accent); color:#fff; border-radius:10px; padding:9px 13px; font-weight:700; font-size:13px }

  /* ---------- Cooking mode ---------- */
  .start-cook{
    margin:20px 22px 0; width:calc(100% - 44px);
    display:flex; align-items:center; justify-content:center; gap:10px;
    background:var(--accent); color:#fff; font-weight:800; font-size:18px; letter-spacing:.02em;
    padding:16px; border-radius:16px; box-shadow:0 8px 20px rgba(195,74,60,.35);
  }
  .start-cook:active{ transform:scale(.98) }
  .start-cook svg{ margin-top:-1px }

  #cookmode{
    position:fixed; inset:0; z-index:80; background:var(--bg); color:var(--ink);
    display:none; flex-direction:column;
  }
  #cookmode.open{ display:flex }
  #cookmode::before{
    content:""; position:absolute; top:0; left:0; right:0; height:calc(var(--safe-top) + 8px); z-index:0;
    background-color:#fbfdff;
    background-image:
      repeating-linear-gradient(0deg,  rgba(var(--blue),.5) 0 8px, rgba(var(--blue),0) 8px 16px),
      repeating-linear-gradient(90deg, rgba(var(--blue),.5) 0 8px, rgba(var(--blue),0) 8px 16px);
  }
  .cook-top{
    position:relative; z-index:1; display:flex; align-items:center; justify-content:space-between;
    gap:8px; padding:calc(var(--safe-top) + 14px) 14px 8px;
  }
  .cook-x{ font-size:20px; font-weight:700; width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); background:var(--bg-2) }
  .cook-count{ font-family:var(--serif); font-weight:700; font-size:16px; color:var(--accent) }
  .cook-ings-btn{ font-weight:700; font-size:15px; color:var(--accent); padding:10px 12px; border-radius:12px }
  .cook-progress{ position:relative; z-index:1; height:7px; background:var(--line); margin:2px 16px 0; border-radius:4px; overflow:hidden }
  .cook-progress-fill{ height:100%; background:var(--accent); width:0; transition:width .25s ease; border-radius:4px }

  .cook-body{ flex:1; overflow-y:auto; display:flex; flex-direction:column; justify-content:center; padding:24px 26px }
  .cook-step{ text-align:center; max-width:560px; margin:0 auto; width:100% }
  .cook-num{
    width:56px; height:56px; margin:0 auto 24px; border-radius:50%;
    background-color:#fbfdff;
    background-image:
      repeating-linear-gradient(0deg,  rgba(var(--blue),.5) 0 9px, rgba(var(--blue),0) 9px 18px),
      repeating-linear-gradient(90deg, rgba(var(--blue),.5) 0 9px, rgba(var(--blue),0) 9px 18px);
    border:2px solid #fff; box-shadow:0 2px 6px rgba(120,90,50,.2);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--serif); font-weight:700; font-size:25px; color:var(--blue-ink);
  }
  .cook-text{ font-size:26px; line-height:1.45; font-weight:500; margin:0 }

  .cook-timer{ margin-top:32px; display:flex; flex-direction:column; align-items:center; gap:18px }
  .cook-timer-start{
    display:inline-flex; align-items:center; gap:10px; background:var(--accent-soft); color:var(--accent-deep);
    border:2px dashed var(--accent); font-weight:700; font-size:18px; padding:16px 26px; border-radius:16px;
  }
  .cook-timer-start:active{ transform:scale(.97) }
  .cook-timer .cook-ring{ position:relative; width:150px; height:150px }
  .cook-ring-time{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:33px; font-weight:800; font-variant-numeric:tabular-nums }
  .cook-timer-acts{ display:flex; gap:12px }
  .cook-timer-acts button{ background:var(--bg-2); color:var(--ink); font-weight:700; font-size:16px; padding:12px 24px; border-radius:12px; border:1.5px solid var(--line) }
  .cook-timer.done{ background:var(--accent); border-radius:22px; padding:24px; color:#fff; animation:flash 1s ease infinite }
  .cook-timer.done .cook-ring-time{ color:#fff }
  .cook-timer.done .cook-timer-acts button{ background:rgba(255,255,255,.22); color:#fff; border-color:transparent }

  .cook-nav{ position:relative; z-index:1; display:flex; gap:12px; padding:12px 16px calc(var(--safe-bottom) + 16px) }
  .cook-back{ flex:0 0 auto; padding:16px 22px; border-radius:14px; font-weight:700; font-size:16px; color:var(--ink-soft); background:var(--bg-2); border:1.5px solid var(--line) }
  .cook-next{ flex:1; padding:16px; border-radius:14px; font-weight:800; font-size:18px; color:#fff; background:var(--accent); box-shadow:0 6px 16px rgba(195,74,60,.3) }
  .cook-next:active,.cook-back:active{ transform:scale(.98) }

  .cook-done{ text-align:center; max-width:440px; margin:0 auto }
  .cook-done-emoji{ font-size:72px; line-height:1 }
  .cook-done h2{ font-family:var(--script); font-size:48px; color:var(--accent-deep); margin:8px 0 6px; font-weight:400 }
  .cook-done p{ font-family:var(--serif); font-style:italic; font-size:18px; color:var(--ink-soft); margin:0 0 28px }
  .cook-done-acts{ display:flex; flex-direction:column; gap:12px }

  .cook-ings-sheet{ position:absolute; inset:0; z-index:3; background:rgba(40,25,15,.4); display:none; align-items:flex-end }
  .cook-ings-sheet.open{ display:flex; animation:fade .18s ease }
  .cook-ings-inner{ width:100%; max-height:72%; background:var(--card); border-radius:22px 22px 0 0; padding:6px 20px calc(var(--safe-bottom) + 20px); overflow-y:auto; box-shadow:var(--shadow-lg); animation:pop .22s ease }
  .cook-ings-head{ display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--card); padding:16px 0 12px; font-family:var(--serif); font-weight:700; font-size:20px; border-bottom:1.5px dotted var(--blue-solid) }
  .cook-ings-head button{ color:var(--accent); font-weight:700; font-size:16px }
  #cook-ings-list{ list-style:none; margin:0; padding:8px 0 0 }
  #cook-ings-list li{ padding:13px 4px; border-bottom:1.5px dotted var(--blue-solid); font-size:17px }
  #cook-ings-list li:last-child{ border-bottom:none }
  #cook-ings-list li.done{ color:var(--muted); text-decoration:line-through }

  .view{ display:none }
  .view.active{ display:block; animation:fade .18s ease }
  @keyframes fade{ from{ opacity:0 } to{ opacity:1 } }
</style>
</head>
<body>
<div class="app">
  <!-- HOME -->
  <div id="view-home" class="view active">
    <div class="banner gingham"></div>
    <div class="banner-scallop gingham"></div>
    <div class="home-head">
      <div class="tagline">Just like Mom's</div>
      <h1 class="masthead">Loretta's Cookbook</h1>
      <p class="subtitle">Tap a recipe to start cooking</p>
    </div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Search recipes or ingredients" autocomplete="off" />
    </div>
    <div class="chips" id="chips"></div>
    <div class="grid" id="grid"></div>
    <div class="home-foot">Made for Mom &#9829;</div>
  </div>

  <!-- RECIPE -->
  <div id="view-recipe" class="view">
    <div class="topbar" id="topbar">
      <button class="back" onclick="goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        Recipes
      </button>
      <div class="t-title" id="t-title"></div>
      <div class="spacer"></div>
    </div>
    <div id="recipe-body"></div>
    <div class="r-foot"></div>
  </div>
</div>

<div id="tray"></div>

<!-- COOKING MODE -->
<div id="cookmode">
  <div class="cook-top">
    <button class="cook-x" onclick="exitCook()" aria-label="Close cooking mode">&#10005;</button>
    <div class="cook-count" id="cook-count"></div>
    <button class="cook-ings-btn" onclick="toggleCookIngs()">Ingredients</button>
  </div>
  <div class="cook-progress"><div class="cook-progress-fill" id="cook-progress-fill"></div></div>
  <div class="cook-body" id="cook-body"></div>
  <div class="cook-nav" id="cook-nav">
    <button class="cook-back" id="cook-prev" onclick="cookBack()">&#9666; Back</button>
    <button class="cook-next" id="cook-next" onclick="cookAdvance()">Next &#9656;</button>
  </div>
  <div class="cook-ings-sheet" id="cook-ings">
    <div class="cook-ings-inner">
      <div class="cook-ings-head">Ingredients <button onclick="toggleCookIngs()">Done</button></div>
      <ul id="cook-ings-list"></ul>
    </div>
  </div>
</div>

<div id="a2hs">
  <div class="ic">&#128241;</div>
  <div class="tx"><b>Add to your Home Screen</b><br/>Tap the Share button, then <b>Add to Home Screen</b>.</div>
  <button onclick="dismissA2HS()">Got it</button>
</div>

<script>
/* =====================================================================
   RECIPES  —  This is the only thing you edit to add new recipes.
   ---------------------------------------------------------------------
   To add a recipe, copy one block below and fill it in:

   {
     id: "unique-slug",              // lowercase, dashes, no spaces
     title: "Recipe Name",
     emoji: "🍎",                    // shows on the card & hero
     image: null,                    // or "data:image/jpeg;base64,..." for a photo
     category: "Dinner",             // Breakfast / Dinner / Dessert / Baking ...
     time: "45 min",
     servings: "4",
     difficulty: "Easy",
     description: "One friendly line about the dish.",
     ingredients: [
       "1 cup flour",
       "2 eggs"
     ],
     steps: [
       { text: "Do the first thing." },
       { text: "Bake until golden.", timer: 20, timerLabel: "Bake" }  // timer = minutes
     ],
     notes: "An optional tip from Loretta."
   }

   That's it — the app builds the page, checklists, and timers automatically.
   ===================================================================== */
let RECIPES = [];  // loaded at runtime from recipes.json (edit that file to add recipes)

/* =====================================================================
   APP  (you shouldn't need to touch anything below this line)
   ===================================================================== */
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

/* ---- progress persistence ---- */
function loadProg(id){ try{ return JSON.parse(localStorage.getItem('lc:prog:'+id)) || {ing:{},step:{}}; }catch(e){ return {ing:{},step:{}}; } }
function saveProg(id, p){ try{ localStorage.setItem('lc:prog:'+id, JSON.stringify(p)); }catch(e){} }

/* ---- home ---- */
let activeCat = 'All';
function categories(){
  const set = ['All', ...new Set(RECIPES.map(r => r.category).filter(Boolean))];
  return set;
}
function renderChips(){
  const wrap = $('#chips');
  wrap.innerHTML = categories().map(c =>
    `<button class="chip ${c===activeCat?'active':''}" onclick="setCat('${esc(c)}')">${esc(c)}</button>`
  ).join('');
}
function setCat(c){ activeCat = c; renderChips(); renderGrid(); }

function renderGrid(){
  const q = ($('#search').value || '').trim().toLowerCase();
  const grid = $('#grid');
  let list = RECIPES.filter(r => activeCat==='All' || r.category===activeCat);
  if(q){
    list = list.filter(r =>
      r.title.toLowerCase().includes(q) ||
      (r.description||'').toLowerCase().includes(q) ||
      (r.ingredients||[]).join(' ').toLowerCase().includes(q)
    );
  }
  if(!list.length){
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">No recipes found.<br/>Try another search.</div>`;
    return;
  }
  grid.innerHTML = list.map(r => `
    <button class="card" onclick="openRecipe('${r.id}')">
      <div class="thumb">${r.image ? `<img src="${r.image}" alt="">` : (r.emoji||'🍽️')}</div>
      <div class="body">
        <h3>${esc(r.title)}</h3>
        <div class="meta">
          ${r.category?`<span>${esc(r.category)}</span>`:''}
          ${r.servings?`<span>🍽 ${esc(r.servings)}</span>`:''}
        </div>
      </div>
    </button>
  `).join('');
}

/* ---- recipe view ---- */
let currentRecipe = null;
function openRecipe(id){
  const r = RECIPES.find(x => x.id===id);
  if(!r) return;
  location.hash = '#/r/'+id;
}
function goHome(){ location.hash = ''; }

function renderRecipe(r){
  currentRecipe = r;
  const prog = loadProg(r.id);
  $('#t-title').textContent = r.title;

  const ings = r.ingredients.map((ing,i)=>`
    <li class="${prog.ing[i]?'done':''}" onclick="toggleIng(${i})">
      <span class="check">${checkSVG()}</span>
      <span class="txt">${esc(ing)}</span>
    </li>`).join('');

  const steps = r.steps.map((s,i)=>{
    const t = s.timer ? `<button class="timer-btn" id="tbtn-${i}" onclick="event.stopPropagation();startStepTimer(${i})">${clockSVG()} Start ${s.timer} min${s.timerLabel?' · '+esc(s.timerLabel):''}</button>` : '';
    return `
    <li class="step ${prog.step[i]?'done':''}" id="step-${i}">
      <div class="sidx">${i+1}</div>
      <div class="sbody">
        <div class="step-top">
          <p class="stext">${esc(s.text)}</p>
          <span class="check" onclick="toggleStep(${i})">${checkSVG()}</span>
        </div>
        ${t}
      </div>
    </li>`;
  }).join('');

  $('#recipe-body').innerHTML = `
    <div class="hero gingham">${r.image ? `<img src="${r.image}" alt="">` : (r.emoji||'🍽️')}</div>
    <div class="r-head">
      ${r.category?`<div class="r-cat">${esc(r.category)}</div>`:''}
      <h1>${esc(r.title)}</h1>
      ${r.description?`<p class="desc">${esc(r.description)}</p>`:''}
    </div>
    <div class="r-meta">
      ${r.servings?`<div class="pill"><b>${esc(r.servings)}</b><small>Serves</small></div>`:''}
      <div class="pill"><b>${r.steps.length}</b><small>Steps</small></div>
      ${r.page?`<div class="pill"><b>Pg.&nbsp;${esc(String(r.page))}</b><small>In the book</small></div>`:''}
    </div>
    <button class="start-cook" onclick="enterCook()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
      Start Cooking
    </button>
    <div class="section">
      <h2><span class="num">✓</span> Ingredients</h2>
      <p class="sub">Tap each one as you gather it</p>
      <ul class="ings">${ings}</ul>
    </div>
    <div class="section">
      <h2><span class="num">▸</span> Steps</h2>
      <p class="sub">Tap the circle to check off a step</p>
      <ul class="steps">${steps}</ul>
    </div>
    ${r.notes?`<div class="notes"><span class="lbl">Loretta's note</span><span>${esc(r.notes)}</span></div>`:''}
  `;
  refreshTimerButtons();
  requestWake();
}
function checkSVG(){ return `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>`; }
function clockSVG(){ return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`; }

function toggleIng(i){
  const r = currentRecipe; const p = loadProg(r.id);
  p.ing[i] = !p.ing[i]; saveProg(r.id, p);
  $$('#recipe-body .ings li')[i].classList.toggle('done', !!p.ing[i]);
}
function toggleStep(i){
  const r = currentRecipe; const p = loadProg(r.id);
  p.step[i] = !p.step[i];
  if(p.step[i]) crossOffUses(r, i, p);   // completing a step crosses off the ingredients it uses
  saveProg(r.id, p);
  $('#step-'+i).classList.toggle('done', !!p.step[i]);
  syncIngredientDom(p);
}
// As the cook progresses, ingredients used by a completed step get checked off.
function crossOffUses(r, i, p){ (((r.steps[i]||{}).uses)||[]).forEach(u=>{ p.ing[u]=true; }); }
function syncIngredientDom(p){
  $$('#recipe-body .ings li').forEach((li,idx)=>{ li.classList.toggle('done', !!p.ing[idx]); });
}
function renderCookIngs(){
  const r=currentRecipe; if(!r) return;
  const p=loadProg(r.id);
  $('#cook-ings-list').innerHTML = r.ingredients.map((x,idx)=>
    `<li class="${p.ing[idx]?'done':''}">${esc(x)}</li>`).join('');
}

/* ---- timers ---- */
let timers = [];   // {key, label, sub, total, remaining, endAt, paused, done, stepIdx, recipeId}
let ticker = null;
let audioCtx = null;

function ensureAudio(){
  if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
  if(audioCtx && audioCtx.state==='suspended'){ audioCtx.resume(); }
}
function startStepTimer(i){
  ensureAudio(); requestNotify();
  const r = currentRecipe; const s = r.steps[i];
  if(!s.timer) return;
  const key = r.id+':'+i;
  if(timers.find(t=>t.key===key)) return; // already running
  const total = s.timer*60;
  timers.push({
    key, stepIdx:i, recipeId:r.id,
    label:(s.timerLabel||r.title), sub:r.title,
    total, remaining:total, endAt:Date.now()+total*1000, paused:false, done:false
  });
  startTicker(); renderTray(); refreshTimerButtons(); saveTimers(); if(cookOpen) syncCookTimer();
}
function startTicker(){ if(!ticker) ticker = setInterval(tick, 250); manageWake(); }
function tick(){
  const now = Date.now();
  let changed=false;
  timers.forEach(t=>{
    if(t.paused || t.done) return;
    const rem = Math.max(0, Math.round((t.endAt-now)/1000));
    if(rem!==t.remaining){ t.remaining=rem; changed=true; }
    if(rem<=0 && !t.done){ t.done=true; changed=true; fireAlarm(t); }
  });
  if(changed){ renderTray(); saveTimers(); if(cookOpen) syncCookTimer(); }
}
function pauseTimer(key){
  const t = timers.find(x=>x.key===key); if(!t||t.done) return;
  if(t.paused){ t.paused=false; t.endAt=Date.now()+t.remaining*1000; }
  else { t.paused=true; t.remaining=Math.max(0,Math.round((t.endAt-Date.now())/1000)); }
  renderTray(); saveTimers(); if(cookOpen) syncCookTimer();
}
function dismissTimer(key){
  timers = timers.filter(x=>x.key!==key);
  if(!timers.length && ticker){ clearInterval(ticker); ticker=null; }
  renderTray(); refreshTimerButtons(); manageWake(); saveTimers(); if(cookOpen) syncCookTimer();
}
/* ---- timers survive closing/reopening the app (uses phone storage) ---- */
function saveTimers(){
  try{
    const data = timers.map(t=>({key:t.key,stepIdx:t.stepIdx,recipeId:t.recipeId,label:t.label,sub:t.sub,total:t.total,endAt:t.endAt,paused:t.paused,remaining:t.remaining,done:t.done}));
    localStorage.setItem('lc:timers', JSON.stringify(data));
  }catch(e){}
}
function restoreTimers(){
  try{
    const data = JSON.parse(localStorage.getItem('lc:timers')||'[]');
    const now = Date.now();
    timers = data.filter(t=> t.paused || t.done || t.endAt > now - 6*3600*1000 ); // drop very stale
    timers.forEach(t=>{
      if(!t.paused && !t.done){
        t.remaining = Math.max(0, Math.round((t.endAt-now)/1000));
        if(t.remaining<=0) t.done = true;
      }
    });
    if(timers.some(t=>!t.done && !t.paused)) startTicker();
    renderTray();
  }catch(e){ timers=[]; }
}

/* ---- notifications (best effort; full background alerts need the push
   setup described in HANDOFF.md, since iOS suspends web timers in the background) ---- */
function requestNotify(){
  try{ if('Notification' in window && Notification.permission==='default'){ Notification.requestPermission(); } }catch(e){}
}
function notify(t){
  try{
    if(!('Notification' in window) || Notification.permission!=='granted') return;
    const title = '⏱ ' + (t.label||'Timer') + ' is done!';
    const body = (t.sub? t.sub+' — ':'') + 'Time to move to the next step.';
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>{
        try{ reg.showNotification(title,{body,icon:'icon-192.png',badge:'icon-192.png',tag:t.key,renotify:true}); }
        catch(e){ try{ new Notification(title,{body}); }catch(_){} }
      });
    } else { new Notification(title,{body}); }
  }catch(e){}
}

function fmt(sec){
  sec=Math.max(0,sec);
  const m=Math.floor(sec/60), s=sec%60;
  return m+':'+String(s).padStart(2,'0');
}
function renderTray(){
  const tray = $('#tray');
  tray.innerHTML = timers.map(t=>{
    const frac = t.total? (t.remaining/t.total) : 0;
    const R=16, C=2*Math.PI*R, off=C*(1-frac);
    return `
    <div class="tmr ${t.done?'done':''}">
      <div class="ring">
        <svg width="40" height="40" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="${R}" fill="none" stroke="${t.done?'rgba(255,255,255,.3)':'var(--line)'}" stroke-width="4"/>
          <circle cx="20" cy="20" r="${R}" fill="none" stroke="${t.done?'#fff':'var(--accent)'}" stroke-width="4"
            stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
        </svg>
      </div>
      <div class="info">
        <div class="lab">${t.done?'✓ ':''}${esc(t.label)}${t.done?' — done!':''}</div>
        <div class="time">${t.done?'0:00':fmt(t.remaining)}</div>
      </div>
      <div class="acts">
        ${t.done ? '' : `<button class="tbtn" onclick="pauseTimer('${t.key}')" aria-label="pause/play">${t.paused?playSVG():pauseSVG()}</button>`}
        <button class="tbtn" onclick="dismissTimer('${t.key}')" aria-label="dismiss">${xSVG()}</button>
      </div>
    </div>`;
  }).join('');
}
function pauseSVG(){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>`; }
function playSVG(){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>`; }
function xSVG(){ return `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`; }

function refreshTimerButtons(){
  if(!currentRecipe) return;
  currentRecipe.steps.forEach((s,i)=>{
    const btn = $('#tbtn-'+i); if(!btn) return;
    const running = timers.find(t=>t.key===currentRecipe.id+':'+i);
    if(running){
      btn.classList.add('running');
      btn.innerHTML = clockSVG()+' Timer running…';
    } else {
      btn.classList.remove('running');
      btn.innerHTML = clockSVG()+` Start ${s.timer} min${s.timerLabel?' · '+esc(s.timerLabel):''}`;
    }
  });
}

function fireAlarm(t){
  // sound
  if(audioCtx){
    const now = audioCtx.currentTime;
    for(let k=0;k<3;k++){
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type='sine'; o.frequency.value = 880;
      const st = now + k*0.6;
      g.gain.setValueAtTime(0.0001, st);
      g.gain.exponentialRampToValueAtTime(0.4, st+0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, st+0.45);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(st); o.stop(st+0.5);
    }
  }
  if(navigator.vibrate) navigator.vibrate([300,150,300,150,300]);
  notify(t);
  refreshTimerButtons();
}

/* ---- cooking mode (full-screen, hands-free, one step at a time) ---- */
let cookOpen=false, cookIdx=0, cookTouchX=null;
function enterCook(){
  if(!currentRecipe) return;
  ensureAudio();
  const p = loadProg(currentRecipe.id);
  const start = currentRecipe.steps.findIndex((s,i)=>!p.step[i]);
  cookIdx = start<0 ? 0 : start;
  cookOpen = true;
  renderCookIngs();
  $('#cook-ings').classList.remove('open');
  $('#cookmode').classList.add('open');
  renderCook();
  requestWake();
}
function exitCook(){
  cookOpen=false;
  $('#cookmode').classList.remove('open');
  if(currentRecipe) renderRecipe(currentRecipe);  // sync checked-off steps back to the recipe page
  manageWake();
}
function cookBack(){ if(cookIdx>0){ cookIdx--; renderCook(); } }
function cookAdvance(){
  const r=currentRecipe, n=r.steps.length;
  const p=loadProg(r.id);
  p.step[cookIdx]=true;            // finishing a step checks it off
  crossOffUses(r, cookIdx, p);     // and crosses off the ingredients that step used
  saveProg(r.id,p);
  renderCookIngs();                // reflect it in the "Ingredients" peek sheet
  cookIdx = (cookIdx>=n-1) ? n : cookIdx+1;
  renderCook();
}
function cookRestart(){ cookIdx=0; renderCook(); }
function toggleCookIngs(){
  const sheet=$('#cook-ings');
  if(!sheet.classList.contains('open')) renderCookIngs();
  sheet.classList.toggle('open');
}
function renderCook(){
  const r=currentRecipe; if(!r) return;
  const n=r.steps.length, body=$('#cook-body');
  if(cookIdx>=n){
    $('#cook-count').textContent='Finished';
    $('#cook-progress-fill').style.width='100%';
    $('#cook-nav').style.display='none';
    body.innerHTML=`
      <div class="cook-done">
        <div class="cook-done-emoji">🎉</div>
        <h2>All done!</h2>
        <p>Enjoy your ${esc(r.title)}, made just like Mom's.</p>
        <div class="cook-done-acts">
          <button class="cook-next" onclick="exitCook()">Back to recipe</button>
          <button class="cook-back" onclick="cookRestart()">Cook it again</button>
        </div>
      </div>`;
    return;
  }
  $('#cook-nav').style.display='';
  const s=r.steps[cookIdx];
  $('#cook-count').textContent=`Step ${cookIdx+1} of ${n}`;
  $('#cook-progress-fill').style.width=(((cookIdx+1)/n)*100)+'%';
  $('#cook-prev').style.visibility = cookIdx===0 ? 'hidden' : 'visible';
  $('#cook-next').innerHTML = (cookIdx===n-1) ? 'Finish &#10003;' : 'Next &#9656;';
  body.innerHTML=`
    <div class="cook-step">
      <div class="cook-num">${cookIdx+1}</div>
      <p class="cook-text">${esc(s.text)}</p>
      ${s.timer?`<div class="cook-timer" id="cook-timer"></div>`:''}
    </div>`;
  syncCookTimer();
}
function syncCookTimer(){
  const box=$('#cook-timer'); if(!box||!currentRecipe) return;
  const s=currentRecipe.steps[cookIdx]; if(!s||!s.timer) return;
  const key=currentRecipe.id+':'+cookIdx;
  const t=timers.find(x=>x.key===key);
  if(!t){
    box.className='cook-timer';
    box.innerHTML=`<button class="cook-timer-start" onclick="startStepTimer(${cookIdx})">${clockSVG()} Start ${s.timer} min timer${s.timerLabel?' · '+esc(s.timerLabel):''}</button>`;
    return;
  }
  const R=54, C=2*Math.PI*R, frac=t.total?(t.remaining/t.total):0, off=C*(1-frac);
  box.className='cook-timer'+(t.done?' done':'');
  box.innerHTML=`
    <div class="cook-ring">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle cx="75" cy="75" r="${R}" fill="none" stroke="${t.done?'rgba(255,255,255,.35)':'var(--line)'}" stroke-width="9"/>
        <circle cx="75" cy="75" r="${R}" fill="none" stroke="${t.done?'#fff':'var(--accent)'}" stroke-width="9" stroke-linecap="round" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 75 75)"/>
      </svg>
      <div class="cook-ring-time">${t.done?"Time's up!":fmt(t.remaining)}</div>
    </div>
    <div class="cook-timer-acts">
      ${t.done?'':`<button onclick="pauseTimer('${key}')">${t.paused?'Resume':'Pause'}</button>`}
      <button onclick="dismissTimer('${key}')">${t.done?'Dismiss':'Reset'}</button>
    </div>`;
}
function cookInit(){
  const b=$('#cook-body'); if(!b) return;
  b.addEventListener('touchstart', e=>{ cookTouchX=e.touches[0].clientX; }, {passive:true});
  b.addEventListener('touchend', e=>{
    if(cookTouchX==null) return;
    const dx=e.changedTouches[0].clientX-cookTouchX; cookTouchX=null;
    if(Math.abs(dx)<55) return;
    if(dx<0) cookAdvance(); else cookBack();
  }, {passive:true});
}

/* ---- wake lock (keep screen on while cooking) ---- */
let wakeLock = null;
async function requestWake(){
  try{
    if('wakeLock' in navigator && document.visibilityState==='visible'){
      wakeLock = await navigator.wakeLock.request('screen');
    }
  }catch(e){}
}
function manageWake(){
  const shouldHold = (location.hash.startsWith('#/r/')) || timers.some(t=>!t.done) || cookOpen;
  if(shouldHold) requestWake();
  else if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock=null; }
}
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='visible') manageWake(); });

/* ---- routing ---- */
function route(){
  const h = location.hash;
  const m = h.match(/^#\/r\/(.+)$/);
  if(m){
    const r = RECIPES.find(x=>x.id===decodeURIComponent(m[1]));
    if(r){
      renderRecipe(r);
      $('#view-home').classList.remove('active');
      $('#view-recipe').classList.add('active');
      window.scrollTo(0,0);
      manageWake();
      return;
    }
  }
  // home
  $('#view-recipe').classList.remove('active');
  $('#view-home').classList.add('active');
  currentRecipe = null;
  manageWake();
}
window.addEventListener('hashchange', route);

/* ---- topbar scroll state ---- */
window.addEventListener('scroll', ()=>{
  const tb = $('#topbar');
  if(tb) tb.classList.toggle('scrolled', window.scrollY>140);
}, {passive:true});

/* ---- Add to Home Screen banner (iOS Safari only, not already installed) ---- */
function isStandalone(){ return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches; }
function maybeShowA2HS(){
  const iOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const dismissed = localStorage.getItem('lc:a2hs')==='1';
  if(iOS && !isStandalone() && !dismissed){
    setTimeout(()=>{ $('#a2hs').style.display='flex'; }, 1200);
  }
}
function dismissA2HS(){ localStorage.setItem('lc:a2hs','1'); $('#a2hs').style.display='none'; }

/* ---- data loading (recipes live in recipes.json so the admin tool can edit them) ---- */
async function loadRecipes(){
  const grid=$('#grid');
  try{
    const res = await fetch('recipes.json', {cache:'no-cache'});
    if(!res.ok) throw 0;
    RECIPES = await res.json();
  }catch(e){
    RECIPES = [];
    if(grid) grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Couldn't load recipes.<br/>Make sure recipes.json sits next to this page.</div>`;
  }
  renderChips();
  renderGrid();
  route();
}

/* ---- init ---- */
$('#search').addEventListener('input', renderGrid);
cookInit();
restoreTimers();
loadRecipes();
maybeShowA2HS();
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
</body>
